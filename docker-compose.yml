networks:
  app-net:
    driver: bridge

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dairy_report
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/dairy_report?schema=public
      JWT_SECRET: local-dev-secret-please-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - /app/node_modules
    networks:
      - app-net
    depends_on:
      db:
        condition: service_healthy
    # バックエンドが /health を返せるようになってから frontend が起動する
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    command: >
      sh -c "
        npx prisma generate &&
        npx prisma db push --accept-data-loss &&
        (npx tsx prisma/seed.ts; npm run dev)
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY: http://backend:3000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules
    networks:
      - app-net
    # backend が healthy になってから起動（DNS 登録を確実にする）
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
